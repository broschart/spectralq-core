<div id="panel-bluesky_monitor" class="wz-panel" style="display:none;">
  <div class="wz-main-header">
    <h2 data-i18n="wz_bsm_title">Bluesky Keyword Monitor</h2>
    <span style="font-size:11px;color:var(--muted);" data-i18n="wz_bsm_source">Source: Bluesky / AT Protocol</span>
    </button>
    <p class="wz-panel-desc" data-i18n="wz_bsm_desc">Monitors keyword mentions on Bluesky. Shows post volume over time — useful for detecting discourse shifts, viral narratives and public resonance.</p>
  </div>
  <div class="wz-main-body">
    <div id="wz-map-bluesky_monitor" class="wz-map-container" style="display:none;"></div>
    <div class="wz-hint" id="wz-hint-bluesky_monitor" data-i18n="wz_bsm_hint">
      Enter keywords and create a zone. Posts on Bluesky
      will be counted automatically.
    </div>
    <div class="wz-zone-list" id="wz-zones-bluesky_monitor"></div>
  </div>
</div>

<script>
function _bsmCreateZone() {
  var keywords = prompt("Keywords eingeben (kommagetrennt):", "");
  if (!keywords || !keywords.trim()) return;
  var name = prompt("Name der Keyword-Gruppe:", keywords.split(",")[0].trim());
  if (!name) return;

  fetch("/api/watchzones", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: name,
      zone_type: "bluesky_monitor",
      geometry: { type: "Point", coordinates: [0, 0] },
      config: { keywords: keywords, days: 180 },
    }),
  }).then(r => r.json()).then(data => {
    if (data.id) location.reload();
    else alert(data.error || "Fehler beim Erstellen");
  });
}
</script>
